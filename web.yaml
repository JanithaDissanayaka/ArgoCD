apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: janithadissanayaka/learn:tagname
          ports:
            - containerPort: 80
          env:
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:          
                  name: mongodb-configmap
                  key: database_url
---
apiVersion: v1
kind: Service
metadata:     
  name: web-service
spec:
  selector:
    app: web
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80